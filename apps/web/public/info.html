<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZERO — Информация</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top right, rgba(255,255,255,0.08), transparent 30%), linear-gradient(180deg, #050505, #101010);
        color: #f5f5f5;
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      .card {
        border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        box-shadow: 0 24px 60px rgba(0,0,0,0.28);
        padding: 22px;
      }
      h1 { margin: 0 0 10px; font-size: clamp(28px, 5vw, 42px); letter-spacing: -0.05em; }
      p { margin: 0; line-height: 1.6; color: rgba(255,255,255,0.8); }
      .stack { display: grid; gap: 14px; }
      .actions { display: grid; gap: 12px; margin-top: 18px; }
      .button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 52px;
        padding: 0 18px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.14);
        background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.08));
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
      .section {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid rgba(255,255,255,0.08);
      }
      .muted { font-size: 14px; color: rgba(255,255,255,0.62); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card stack">
        <div>
          <p class="muted">Информация о сервисе</p>
          <h1>ZERO</h1>
          <p>ZERO — цифровой онлайн-сервис с мини-приложением в Telegram. Ниже собраны основные документы и форма для обращений.</p>
        </div>

        <div class="section stack">
          <p class="muted">Юридическая информация</p>
          <div class="actions">
            <a class="button" href="/privacy.html">Политика конфиденциальности</a>
            <a class="button" href="/terms.html">Пользовательское соглашение</a>
            <a class="button" href="/contact.html">Обратная связь и тикеты</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
